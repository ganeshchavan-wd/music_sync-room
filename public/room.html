<!DOCTYPE html>
<html>
<head>
  <title>Music Sync Room</title>

  <!-- 🌐 Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      min-height: 100vh;

      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: background 0.5s ease, color 0.5s ease;
    }

    body.dark {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    * {
      transition: background 0.4s ease, color 0.4s ease;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 15px;
    }

    body.dark .container {
      background: rgba(0, 0, 0, 0.4);
    }

    #title {
      text-align: center;
      font-size: 36px;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(45deg, #00c853, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #539fce;
      color: white;
    }

    #muteBtn {
      background: rgb(164, 156, 154);
    }

    #themeBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: black;
      font-size: 20px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    #themeBtn:hover {
      transform: scale(1.1) rotate(10deg);
    }

    #player {
      width: 90vw;
      height: 70vh;
      margin-top: 20px;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 300px;
    }

    .center {
      text-align: center;
    }

    #credits {
      margin-top: 15px;
      text-align: left;
      opacity: 0;
      transition: opacity 0.4s ease;
      color: black;
    }

    #credits:hover {
      opacity: 1;
    }

    .names {
      font-size: 16px;
      font-weight: bold;
      color: #0b0d0d;
      animation: floatText 2s ease-in-out infinite alternate;
    }

    body.dark .names {
      color: #00ffcc;
    }

    @keyframes floatText {
      from { transform: translateY(0px); }
      to { transform: translateY(-5px); }
    }
  </style>
</head>

<body>

<button onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="container">

<h2 id="title">🎵 Music Sync Room</h2>

<p id="roomDisplay" class="center"></p>

<div class="center">
  <button onclick="startCall()">🎤 Start Voice</button>
  <button onclick="toggleMute()" id="muteBtn">🔇 Mute</button>
</div>

<h3 id="owner" class="center"></h3>
<p id="status" class="center"></p>

<div class="center">
  <input id="youtubeUrl" placeholder="Enter YouTube link">
  <button onclick="loadYouTube()">Load</button>
  <button onclick="playVideo()">Play</button>
  <button onclick="pauseVideo()">Pause</button>
</div>

<div id="player"></div>

<div id="credits">
  <p class="names">Owner <br>👩‍💻 Chinamyi Udata(Sis) <br>👨‍💻 Ganesh Chavan(Bro)</p>
</div>

</div>

<!-- ✅ FIX: Load YouTube API DIRECTLY -->
<script src="https://www.youtube.com/iframe_api"></script>

<script src="https://music-sync-room.onrender.com/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

<script>
  function toggleTheme() {
    document.body.classList.toggle("dark");
  }
</script>

<script src="app.js"></script>

</body>
</html>
